<!doctype html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->

      src="https://www.googletagmanager.com/gtag/js?id=G-CWX0DT2Y7S"
    ></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Law, Yao Hua — Journalist</title>
    <meta
      name="description"
      content="Works, thoughts, and ideas of Law, Yao Hua, journalist."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400&family=Alegreya+Sans:ital,wght@0,300;0,400;1,300&family=Mulish:wght@300;400&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Reset ──────────────────────────────────── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
      }

      /* ── Design tokens ──────────────────────────── */
      :root {
        --gold: rgba(196, 158, 88, 1);
        --gold-dim: rgba(196, 158, 88, 0.32);
        --gold-hover: rgba(196, 158, 88, 0.65);
        --cream: rgba(240, 228, 200, 0.97);
        --cream-muted: rgba(228, 210, 172, 0.82);
        --text-sub: rgba(196, 168, 112, 0.82);
        --overlay: rgba(12, 10, 8, 0.48);
        --btn-bg: rgba(14, 11, 8, 0.28);
        --btn-bg-h: rgba(120, 85, 30, 0.22);
      }

      /* ── Hero ───────────────────────────────────── */
      .hero {
        position: relative;
        width: 100%;
        height: 100vh;
        min-height: 560px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background-color: #100d0a;
      }

      .hero__bg {
        position: absolute;
        inset: 0;
        background-image: url("hero.jpg");
        background-size: cover;
        background-position: center 30%;
        background-repeat: no-repeat;
        z-index: 0;
        /* Subtle Ken Burns on load */
        animation: kenburns 22s ease-out forwards;
      }

      @keyframes kenburns {
        from {
          transform: scale(1.06);
        }
        to {
          transform: scale(1);
        }
      }

      .hero__overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(10, 8, 6, 0.55) 0%,
          rgba(10, 8, 6, 0.32) 38%,
          rgba(10, 8, 6, 0.58) 100%
        );
        z-index: 1;
      }

      /* ── Content ────────────────────────────────── */
      .hero__content {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 2rem 1.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        /* Fade-up on load */
        opacity: 0;
        transform: translateY(14px);
        animation: fadeup 1.1s 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes fadeup {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .hero__name {
        font-family: "Comfortaa", cursive;
        font-weight: 300;
        font-size: clamp(1.9rem, 6vw, 3.2rem);
        color: var(--cream);
        letter-spacing: 0.1em;
        line-height: 1.15;
      }

      .hero__divider {
        width: 30px;
        height: 0.5px;
        background: var(--gold);
        opacity: 0.55;
        margin: 1.15rem auto 1rem;
      }

      .hero__role {
        font-family: "Mulish", sans-serif;
        font-weight: 300;
        font-size: clamp(0.65rem, 1.8vw, 0.8rem);
        color: var(--text-sub);
        letter-spacing: 0.44em;
        text-transform: uppercase;
        margin-bottom: 2.6rem;
      }

      /* ── Nav buttons ────────────────────────────── */
      .hero__nav {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 9px;
        width: 100%;
        max-width: 300px;
      }

      @media (min-width: 500px) {
        .hero__nav {
          grid-template-columns: repeat(4, 1fr);
          max-width: 500px;
        }
      }

      .hero__btn {
        font-family: "Alegreya Sans", sans-serif;
        font-weight: 300;
        font-size: clamp(0.72rem, 1.8vw, 0.82rem);
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--cream-muted);
        background: var(--btn-bg);
        border: 0.5px solid var(--gold-dim);
        padding: 0.82rem 0.5rem;
        cursor: pointer;
        text-decoration: none;
        display: block;
        border-radius: 2px;
        transition:
          background 0.28s ease,
          border-color 0.28s ease,
          color 0.28s ease,
          transform 0.18s ease;
        /* Staggered fade-in */
        opacity: 0;
        animation: fadeup 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .hero__btn:nth-child(1) {
        animation-delay: 1s;
      }
      .hero__btn:nth-child(2) {
        animation-delay: 1.15s;
      }
      .hero__btn:nth-child(3) {
        animation-delay: 1.3s;
      }
      .hero__btn:nth-child(4) {
        animation-delay: 1.45s;
      }

      .hero__btn:hover {
        background: var(--btn-bg-h);
        border-color: var(--gold-hover);
        color: var(--cream);
        transform: translateY(-1px);
      }

      .hero__btn:active {
        transform: translateY(0px);
      }

      /* ── Footer note ─────────────────────────────── */
      .hero__footer {
        position: absolute;
        bottom: 1.6rem;
        left: 0;
        right: 0;
        text-align: center;
        z-index: 10;
        font-family: "Mulish", sans-serif;
        font-weight: 300;
        font-size: 0.62rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(196, 168, 112, 0.38);
        opacity: 0;
        animation: fadeup 1s 2s ease forwards;
      }
    </style>
  </head>
  <body>
    <main class="hero" role="main">
      <div class="hero__bg" aria-hidden="true"></div>
      <div class="hero__overlay" aria-hidden="true"></div>

      <div class="hero__content">
        <h1 class="hero__name">Law, Yao Hua</h1>
        <div class="hero__divider" aria-hidden="true"></div>
        <p class="hero__role">Journalist</p>

        <nav class="hero__nav" aria-label="Main navigation">
          <a class="hero__btn" href="posts/">Scribble</a>
          <a class="hero__btn" href="stories/">Reporting</a>
          <a class="hero__btn" href="about/">About</a>
          <a class="hero__btn" href="contact/">Connect</a>
        </nav>
      </div>

      <p class="hero__footer">
        Law, Yao Hua &nbsp;&middot;&nbsp; Journalist. (C) 2026
      </p>
    </main>
  </body>
</html>
