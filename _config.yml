title: "Law, Yao Hua"
description: "Works, thoughts, and ideas of Law, Yao Hua, journalist."
url: "https://yhlreporter.github.io"
baseurl: "/site"

author: "Law, Yao Hua"

# Build settings
markdown: kramdown
permalink: /:categories/:year:month:day/:title/
future: true

# Open all Markdown links in a new tab
kramdown:
  link_attrs:
    default:
      target: "_blank"
      rel: "noopener noreferrer"

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
