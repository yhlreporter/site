  function fuzzyMatch(str, pattern) {
    str = str.toLowerCase();
    pattern = pattern.toLowerCase();
    if (str.includes(pattern)) return true;
    const distance = levenshteinDistance(str, pattern);
    const maxLength = Math.max(str.length, pattern.length);
    return distance / maxLength <= 0.3;
  }

  function levenshteinDistance(str1, str2) {
    const matrix = [];
    for (let i = 0; i <= str2.length; i++) matrix[i] = [i];
    for (let j = 0; j <= str1.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= str2.length; i++) {
      for (let j = 1; j <= str1.length; j++) {
        if (str2.charAt(i - 1) === str1.charAt(j - 1)) {
          matrix[i][j] = matrix[i - 1][j - 1];
        } else {
          matrix[i][j] = Math.min(
            matrix[i - 1][j - 1] + 1,
            matrix[i][j - 1] + 1,
            matrix[i - 1][j] + 1,
          );
        }
      }
    }
    return matrix[str2.length][str1.length];
  }

  function populateFilters() {
    const publications = new Set(),
      years = new Set(),
      tags = new Set(),
      languages = new Set();
    stories.forEach((s) => {
      publications.add(s.publication);
      years.add(s.year);
      languages.add(s.language);
      [s.tag1, s.tag2, s.tag3, s.tag4, s.tag5].forEach((t) => {
        if (t && t.trim()) tags.add(t);
      });
    });
    const append = (id, values, sort) => {
      const el = document.getElementById(id);
      (sort
        ? Array.from(values).sort()
        : Array.from(values).sort().reverse()
      ).forEach((v) => {
        const o = document.createElement("option");
        o.value = v;
        o.textContent = v;
        el.appendChild(o);
      });
    };
    append("publicationFilter", publications, true);
    append("yearFilter", years, false);
    append("tagFilter", tags, true);
    append("languageFilter", languages, true);
  }

  function filterStories() {
    const q = document.getElementById("searchBox").value.toLowerCase().trim();
    const pub = document.getElementById("publicationFilter").value;
    const year = document.getElementById("yearFilter").value;
    const tag = document.getElementById("tagFilter").value;
    const lang = document.getElementById("languageFilter").value;
    const fuzzy = document.getElementById("fuzzyToggle").checked;

    let filtered = stories;
    if (pub) filtered = filtered.filter((s) => s.publication === pub);
    if (year) filtered = filtered.filter((s) => s.year === parseInt(year));
    if (lang) filtered = filtered.filter((s) => s.language === lang);
    if (tag)
      filtered = filtered.filter((s) =>
        [s.tag1, s.tag2, s.tag3, s.tag4, s.tag5].includes(tag),
      );
    if (q) {
      filtered = filtered.filter((s) => {
        const fields = [
          s.title,
          s.publication,
          s.language,
          s.tag1,
          s.tag2,
          s.tag3,
          s.tag4,
          s.tag5,
        ];
        return fuzzy
          ? fields.some((f) => f && fuzzyMatch(f, q))
          : fields.some((f) => f && f.toLowerCase().includes(q));
      });
    }
    displayStories(filtered);
  }

  function displayStories(list) {
    const grid = document.getElementById("storiesGrid");
    const count = document.getElementById("resultsCount");
    count.textContent = `— ${list.length} ${list.length === 1 ? "story" : "stories"}`;

    if (list.length === 0) {
      grid.innerHTML = '<p class="stories-empty">No stories found.</p>';
      return;
    }

    grid.innerHTML = list
      .map((s) => {
        const tags = [s.tag1, s.tag2, s.tag3, s.tag4, s.tag5]
          .filter((t) => t && t.length > 0)
          .map((t) => `<span class="s-tag">${t}</span>`)
          .join("");
        const date = [String(s.date), s.month, String(s.year)]
          .filter(Boolean)
          .join(" ");
        return `
      <div class="s-card">
        <p class="s-card__meta">${date} &middot; ${s.publication}</p>
        <h2 class="s-card__title"><a href="${s.url}" target="_blank" rel="noopener">${s.title}</a></h2>
        <div class="s-card__tags">${tags}</div>
      </div>`;
      })
      .join("");
  }

  stories.sort((a, b) => {
    const months = {
      Jan: 1,
      Feb: 2,
      Mar: 3,
      Apr: 4,
      May: 5,
      Jun: 6,
      Jul: 7,
      Aug: 8,
      Sep: 9,
      Oct: 10,
      Nov: 11,
      Dec: 12,
    };
    const dateA = new Date(a.year, (months[a.month] || 1) - 1, a.date || 1);
    const dateB = new Date(b.year, (months[b.month] || 1) - 1, b.date || 1);
    return dateB - dateA;
  });

  populateFilters();
  displayStories(stories);

  document.getElementById("searchBox").addEventListener("input", filterStories);
  document
    .getElementById("publicationFilter")
    .addEventListener("change", filterStories);
  document
    .getElementById("yearFilter")
    .addEventListener("change", filterStories);
  document
    .getElementById("tagFilter")
    .addEventListener("change", filterStories);
  document
    .getElementById("languageFilter")
    .addEventListener("change", filterStories);
  document
    .getElementById("fuzzyToggle")
    .addEventListener("change", filterStories);
  document.getElementById("clearFilters").addEventListener("click", () => {
    ["searchBox"].forEach((id) => (document.getElementById(id).value = ""));
    ["publicationFilter", "yearFilter", "tagFilter", "languageFilter"].forEach(
      (id) => (document.getElementById(id).value = ""),
    );
    document.getElementById("fuzzyToggle").checked = false;
    filterStories();
  });
</script>
