---
layout: default
---

<article class="post">

  <header class="post__header">
    <div class="post__header-inner">
      <p class="post__meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">
          {{ page.date | date: "%d %B %Y" }}
        </time>
        {% if page.category %}
          &nbsp;&middot;&nbsp;
          <span class="post__category">{{ page.category }}</span>
        {% endif %}
      </p>
      <h1 class="post__title">{{ page.title }}</h1>
      {% if page.subtitle %}
        <p class="post__subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </div>
  </header>

  <div class="post__body">
    {{ content }}
  </div>

  <footer class="post__footer">
    <a class="post__back" href="{{ '/posts/' | relative_url }}">← Back to Scribble</a>
  </footer>

</article>

{% if page.gallery %}
{% endif %}

<!-- Lightgallery -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/css/lightgallery-bundle.min.css" />
<link rel="stylesheet" href="{{ '/assets/css/gallery.css' | relative_url }}" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/lightgallery.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/plugins/zoom/lg-zoom.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/plugins/thumbnail/lg-thumbnail.umd.min.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    // Initialise all masonry galleries
    document.querySelectorAll('.gallery--masonry').forEach(function (el) {
      lightGallery(el, {
        selector: '.gallery__item',
        plugins: [lgZoom, lgThumbnail],
        speed: 400,
        download: false,
        subHtmlSelectorRelative: true,
        subHtmlSelector: '.gallery__caption-hidden'
      });
    });

    // Initialise all row galleries
    document.querySelectorAll('.gallery--row').forEach(function (el) {
      lightGallery(el, {
        selector: '.gallery__item',
        plugins: [lgZoom],
        speed: 400,
        download: false,
        subHtmlSelectorRelative: true,
        subHtmlSelector: '.gallery__caption-hidden'
      });
    });
  });
</script>
